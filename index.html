<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 GitHub 3D 模型展示 (真實渲染版)</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; }
        
        model-viewer {
            width: 100vw;
            height: 100vh;
            background-color: #e0e5ec; 
        }
    </style>
</head>
<body>

    <model-viewer 
        src="https://cdn.jsdelivr.net/gh/ilvs515047/rtrtp@main/abc.glb" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1.5"
        shadow-softness="1"
        exposure="1"
        environment-image="neutral"
        alt="我的 3D 模型">
    </model-viewer>

</body>
</html>
