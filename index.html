<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 GitHub 3D 建築展示 (真實光影版1)</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            /* 用一個乾淨的漸層背景取代純色，讓空間更有深度 */
            background: radial-gradient(circle at 50% 50%, #e0e5ec, #b8c6db);
            font-family: sans-serif;
            overflow: hidden;
        }
        
        model-viewer {
            width: 100vw;
            height: 100vh;
            --poster-color: transparent;
        }

        .loading-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #555;
            font-weight: bold;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="loading-text">載入高品質光影中...</div>

    <model-viewer 
        src="https://cdn.jsdelivr.net/gh/ilvs515047/rtrtp@main/abc.glb" 
        alt="我的 3D 建築模型"
        camera-controls 
        auto-rotate 
        rotation-per-second="15deg"
        shadow-intensity="2" 
        shadow-softness="0.8" 
        exposure="1.1"
        tone-mapping="aces"
        environment-image="https://modelviewer.dev/shared-assets/environments/spruit_sunrise_1k_HDR.hdr"
        min-camera-orbit="auto auto 5m"
        max-camera-orbit="auto 85deg auto"
        camera-orbit="-45deg 60deg 15m"
        field-of-view="30deg">
    </model-viewer>

</body>
</html>
